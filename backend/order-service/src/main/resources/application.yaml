server:
  port: 8083

spring:
  application:
    name: order-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:order_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# JWT
jwt:
  # Updated the fallback string to be 64 characters long to pass validation
  secret: ${JWT_SECRET:verdemango-super-secret-key-2026-development-only-do-not-use-in-prod}
  issuer: verde-mango-auth

# Order Config
order:

  cart-expiration-hours: 24
  cancellation-window-hours: 2
  tax-rate: 0.19
  default-shipping-cost: 12000

# Services URLs
services:
  product-service:
    url: ${PRODUCT_SERVICE_URL:http://localhost:8082}
    timeout: 5000
  payment-service:
    url: ${PAYMENT_SERVICE_URL:http://localhost:8085}
    timeout: 10000

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

# OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# Logging
logging:
  level:
    com.verdemango: DEBUG
    org.hibernate.SQL: DEBUG