server:
  port: 8084

spring:
  application:
    name: recipe-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:recipe_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cache:
    type: redis
    redis:
      time-to-live: 3600000  # 1 hora

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# JWT
jwt:
  secret: ${JWT_SECRET:verdemango-super-secret-key-2024}
  issuer: verde-mango-auth

# Recipe Config
recipe:
  # Número de recetas destacadas en home
  featured-limit: 6
  # Número de recetas populares
  popular-limit: 10
  # Incrementar views cada X segundos por IP (evitar spam)
  view-throttle-seconds: 300

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

# OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# Logging
logging:
  level:
    com.verdemango: DEBUG
    org.hibernate.SQL: DEBUG